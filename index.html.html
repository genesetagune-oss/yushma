<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Yushma ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #f8b6c8, #f4d6df, #fbe7ee);
      font-family: Georgia, serif;
      text-align: center;
      color: white;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 28px;
      padding: 28px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    .tap-area {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      cursor: pointer;
      user-select: none;
    }

    .gift {
      font-size: 92px;
      line-height: 1;
      animation: bounce 1.6s infinite;
    }

    .hint {
      margin-top: 14px;
      font-size: 1rem;
      opacity: 0.95;
    }

    .hidden {
      display: none;
    }

    .rose {
      font-size: 90px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 10px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    .name {
      font-size: 1.6rem;
      font-weight: bold;
      margin-bottom: 14px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }

    .message {
      font-size: 1.25rem;
      line-height: 1.6;
      max-width: 560px;
      margin: 0 auto;
      text-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .quote {
      margin-top: 22px;
      font-size: 1rem;
      font-style: italic;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .quote.show {
      opacity: 1;
    }

    .signature {
      margin-top: 24px;
      font-size: 1rem;
      opacity: 0.95;
    }

    .btn {
      margin-top: 24px;
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 1rem;
      background: rgba(255,255,255,0.25);
      color: white;
      cursor: pointer;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -20px;
      font-size: 24px;
      animation: rise linear forwards;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes rise {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(-110vh); opacity: 0; }
    }

    @media (max-width: 520px) {
      .gift { font-size: 82px; }
      .rose { font-size: 80px; }
      .title { font-size: 1.8rem; }
      .name { font-size: 1.35rem; }
      .message { font-size: 1.08rem; }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <div class="card">
    <div id="screen1" class="tap-area" onclick="startRomance()">
      <div>
        <div class="gift">🎁</div>
        <div class="hint">touch the gift</div>
      </div>
    </div>

    <div id="screen2" class="hidden">
      <div class="rose">🌹</div>
      <div class="title">you’re irreplaceable ✨</div>
      <div class="name">princesa Yushma ❤️</div>
      <div class="message">
        Entre milhões de flores, tu és a única que faz o meu coração florescer.
      </div>

      <div class="quote" id="quote">
        “If you had a twin, I’d still choose you.”<br>
        — Drake
      </div>

      <div class="signature">with love: your soulmate 💖</div>
      <button class="btn" onclick="resetScene()">see again</button>
    </div>
  </div>

  <script>
    let quoteTimer = null;
    let heartTimer = null;

    function createHeart() {
      const hearts = document.getElementById("hearts");
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = Math.random() > 0.5 ? "💖" : "💕";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (4 + Math.random() * 3) + "s";
      heart.style.fontSize = (18 + Math.random() * 18) + "px";
      hearts.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    function startRomance() {
      document.getElementById("screen1").classList.add("hidden");
      document.getElementById("screen2").classList.remove("hidden");

      const quote = document.getElementById("quote");
      quote.classList.remove("show");

      for (let i = 0; i < 24; i++) {
        setTimeout(createHeart, i * 120);
      }

      clearTimeout(quoteTimer);
      quoteTimer = setTimeout(() => {
        quote.classList.add("show");
      }, 4000);

      clearInterval(heartTimer);
      heartTimer = setInterval(createHeart, 900);
    }

    function resetScene() {
      clearTimeout(quoteTimer);
      clearInterval(heartTimer);

      document.getElementById("quote").classList.remove("show");
      document.getElementById("screen2").classList.add("hidden");
      document.getElementById("screen1").classList.remove("hidden");
    }
  </script>
</body>
</html>
